<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Tester</title>
<style>
  :root{
    --bg: #0b0e0f;
    --panel: #14181a;
    --panel-2: #1b2023;
    --border: #2a3033;
    --text: #e7ebec;
    --text-dim: #8a9499;
    --accent: #5fd3a3;
    --accent-dim: #2f5e4c;
    --warn: #e0b34d;
    --danger: #e0625f;
    --mono: "SFMono-Regular", "Roboto Mono", Consolas, Menlo, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--mono);
    font-size:13px;
    line-height:1.5;
  }
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:20px;
    border-bottom:1px solid var(--border);
    padding-bottom:14px;
  }
  header h1{
    font-size:15px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0;
    font-weight:600;
  }
  header span{
    color:var(--text-dim);
    font-size:12px;
  }

  .request-row{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  select#method{
    background:var(--panel-2);
    color:var(--accent);
    border:1px solid var(--border);
    border-radius:4px;
    padding:10px 10px;
    font-family:var(--mono);
    font-weight:700;
    font-size:13px;
    width:110px;
    cursor:pointer;
  }
  input#url{
    flex:1;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:4px;
    padding:10px 12px;
    font-family:var(--mono);
    font-size:13px;
  }
  input#url::placeholder{ color:var(--text-dim); }
  button#send{
    background:var(--accent);
    color:#08110d;
    border:none;
    border-radius:4px;
    padding:0 22px;
    font-family:var(--mono);
    font-weight:700;
    font-size:13px;
    letter-spacing:0.03em;
    cursor:pointer;
    text-transform:uppercase;
  }
  button#send:hover{ filter:brightness(1.08); }
  button#send:disabled{ opacity:0.5; cursor:default; }

  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:18px;
  }
  @media (max-width:780px){
    .grid{ grid-template-columns: 1fr; }
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    overflow:hidden;
  }
  .panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    background:var(--panel-2);
  }
  .panel-head h2{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-dim);
    margin:0;
    font-weight:600;
  }
  .panel-body{ padding:12px 14px; }

  .headers-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }
  .header-row{
    display:flex;
    gap:6px;
  }
  .header-row input{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:4px;
    color:var(--text);
    padding:7px 9px;
    font-family:var(--mono);
    font-size:12px;
  }
  .header-row .hkey{ flex:0 0 38%; }
  .header-row .hval{ flex:1; }
  .header-row button{
    background:transparent;
    border:1px solid var(--border);
    color:var(--danger);
    border-radius:4px;
    width:30px;
    cursor:pointer;
    font-family:var(--mono);
  }
  .header-row button:hover{ background:rgba(224,98,95,0.1); }

  .small-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:4px;
    padding:6px 10px;
    font-family:var(--mono);
    font-size:11px;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .small-btn:hover{ color:var(--text); border-color:var(--text-dim); }

  textarea#body{
    width:100%;
    min-height:340px;
    background:var(--bg);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:4px;
    padding:10px 12px;
    font-family:var(--mono);
    font-size:12px;
    resize:vertical;
    line-height:1.55;
  }
  .body-disabled{
    opacity:0.4;
  }
  .note{
    font-size:11px;
    color:var(--text-dim);
    margin-top:8px;
  }

  .response-section{
    margin-top:18px;
  }
  .status-line{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:0;
  }
  .status-pill{
    font-weight:700;
    padding:3px 9px;
    border-radius:3px;
    font-size:12px;
  }
  .status-2xx{ background:rgba(95,211,163,0.15); color:var(--accent); }
  .status-4xx, .status-5xx{ background:rgba(224,98,95,0.15); color:var(--danger); }
  .status-3xx{ background:rgba(224,179,77,0.15); color:var(--warn); }
  .status-pending{ background:var(--panel-2); color:var(--text-dim); }
  .meta-text{ color:var(--text-dim); font-size:12px; }

  pre#response-body{
    margin:0;
    white-space:pre-wrap;
    word-break:break-word;
    max-height:480px;
    overflow:auto;
    padding:14px;
    background:var(--bg);
  }
  pre#response-headers{
    margin:0;
    white-space:pre-wrap;
    word-break:break-word;
    max-height:160px;
    overflow:auto;
    padding:14px;
    background:var(--bg);
    color:var(--text-dim);
    font-size:11.5px;
  }
  .empty-state{
    color:var(--text-dim);
    padding:30px 14px;
    text-align:center;
    font-size:12px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>API Tester</h1>
    <span id="clock"></span>
  </header>

  <div class="request-row">
    <select id="method">
      <option value="GET">GET</option>
      <option value="POST" selected>POST</option>
      <option value="PATCH">PATCH</option>
      <option value="PUT">PUT</option>
      <option value="DELETE">DELETE</option>
    </select>
    <input id="url" type="text" placeholder="https://api.contoh.com/endpoint" value="">
    <button id="send">Kirim</button>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <h2>Headers</h2>
        <button class="small-btn" id="add-header">+ Tambah</button>
      </div>
      <div class="panel-body">
        <div class="headers-list" id="headers-list"></div>
        <div class="note">Header kosong (key atau value) otomatis diabaikan saat dikirim.</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Body (JSON)</h2>
        <button class="small-btn" id="reset-body">Reset ke default</button>
      </div>
      <div class="panel-body">
        <textarea id="body" spellcheck="false"></textarea>
        <div class="note" id="body-note">Body tidak dikirim untuk method GET / DELETE.</div>
      </div>
    </div>
  </div>

  <div class="response-section panel">
    <div class="panel-head">
      <div class="status-line">
        <h2>Response</h2>
        <span class="status-pill status-pending" id="status-pill">belum dikirim</span>
        <span class="meta-text" id="status-meta"></span>
      </div>
    </div>
    <div id="response-headers-wrap">
      <pre id="response-headers" style="display:none;"></pre>
    </div>
    <pre id="response-body"><div class="empty-state">Belum ada request yang dikirim.</div></pre>
  </div>

</div>

<script>
const DEFAULT_BODY = {
  "sensor": {
    "data": {
      "DS18B20 Suhu Air": {
        "nilai": 27.8,
        "kualitas_data": "normal",
        "sudah_diproses": true
      },
      "DHT22 Suhu Udara": {
        "nilai": {
          "suhu": 30.2,
          "kelembapan": 65
        },
        "kualitas_data": "normal",
        "sudah_diproses": true
      },
      "HC-SR04 Level Air": {
        "nilai": 82,
        "kualitas_data": "normal",
        "sudah_diproses": true
      },
      "Probe pH Larutan": {
        "nilai": 6.4,
        "kualitas_data": "normal",
        "sudah_diproses": true
      },
      "EC/TDS Probe": {
        "nilai": 1180,
        "kualitas_data": "normal",
        "sudah_diproses": true
      }
    }
  },
  "aktuator": {
    "data": {
      "SSR Pompa Utama": "on",
      "Motor pH Down": "off",
      "Motor pH Up": "off"
    }
  }
};

const methodEl = document.getElementById('method');
const urlEl = document.getElementById('url');
const sendBtn = document.getElementById('send');
const headersListEl = document.getElementById('headers-list');
const addHeaderBtn = document.getElementById('add-header');
const bodyEl = document.getElementById('body');
const resetBodyBtn = document.getElementById('reset-body');
const bodyNote = document.getElementById('body-note');
const statusPill = document.getElementById('status-pill');
const statusMeta = document.getElementById('status-meta');
const responseBodyEl = document.getElementById('response-body');
const responseHeadersEl = document.getElementById('response-headers');

function addHeaderRow(key = '', value = '') {
  const row = document.createElement('div');
  row.className = 'header-row';
  row.innerHTML = `
    <input class="hkey" type="text" placeholder="Header" value="${key.replace(/"/g,'&quot;')}">
    <input class="hval" type="text" placeholder="Value" value="${value.replace(/"/g,'&quot;')}">
    <button title="Hapus header">×</button>
  `;
  row.querySelector('button').addEventListener('click', () => row.remove());
  headersListEl.appendChild(row);
}

addHeaderRow('Content-Type', 'application/json');
addHeaderBtn.addEventListener('click', () => addHeaderRow());

function setDefaultBody() {
  bodyEl.value = JSON.stringify(DEFAULT_BODY, null, 2);
}
setDefaultBody();
resetBodyBtn.addEventListener('click', setDefaultBody);

function updateBodyAvailability() {
  const m = methodEl.value;
  const noBody = (m === 'GET' || m === 'DELETE');
  bodyEl.disabled = noBody;
  bodyEl.classList.toggle('body-disabled', noBody);
  bodyNote.textContent = noBody
    ? 'Body tidak dikirim untuk method ' + m + '.'
    : 'Body akan dikirim sebagai JSON (Content-Type otomatis ditambahkan jika belum ada).';
}
methodEl.addEventListener('change', updateBodyAvailability);
updateBodyAvailability();

function getHeadersObject() {
  const rows = headersListEl.querySelectorAll('.header-row');
  const headers = {};
  rows.forEach(row => {
    const k = row.querySelector('.hkey').value.trim();
    const v = row.querySelector('.hval').value.trim();
    if (k && v) headers[k] = v;
  });
  return headers;
}

function setStatusPill(text, cls) {
  statusPill.textContent = text;
  statusPill.className = 'status-pill ' + cls;
}

function statusClass(status) {
  if (status >= 200 && status < 300) return 'status-2xx';
  if (status >= 300 && status < 400) return 'status-3xx';
  return 'status-4xx';
}

async function sendRequest() {
  const url = urlEl.value.trim();
  if (!url) {
    alert('Isi URL endpoint dulu.');
    return;
  }

  const method = methodEl.value;
  const headers = getHeadersObject();
  const hasBody = !(method === 'GET' || method === 'DELETE');

  let bodyToSend = undefined;
  if (hasBody) {
    const raw = bodyEl.value.trim();
    if (raw) {
      try {
        JSON.parse(raw); // validasi JSON
        bodyToSend = raw;
        const hasContentType = Object.keys(headers).some(k => k.toLowerCase() === 'content-type');
        if (!hasContentType) headers['Content-Type'] = 'application/json';
      } catch (e) {
        alert('Body bukan JSON yang valid:\n' + e.message);
        return;
      }
    }
  }

  sendBtn.disabled = true;
  sendBtn.textContent = 'Mengirim...';
  setStatusPill('mengirim...', 'status-pending');
  statusMeta.textContent = '';
  responseHeadersEl.style.display = 'none';
  responseBodyEl.innerHTML = '<div class="empty-state">Menunggu response...</div>';

  const startTime = performance.now();

  try {
    const res = await fetch(url, {
      method,
      headers,
      body: bodyToSend
    });

    const elapsed = Math.round(performance.now() - startTime);

    setStatusPill(res.status + ' ' + res.statusText, statusClass(res.status));
    statusMeta.textContent = elapsed + ' ms';

    let headerLines = '';
    res.headers.forEach((v, k) => { headerLines += k + ': ' + v + '\n'; });
    responseHeadersEl.textContent = headerLines.trim();
    responseHeadersEl.style.display = headerLines.trim() ? 'block' : 'none';

    const text = await res.text();
    let displayText = text;
    try {
      const parsed = JSON.parse(text);
      displayText = JSON.stringify(parsed, null, 2);
    } catch (e) {
      // bukan JSON, tampilkan apa adanya
    }
    responseBodyEl.textContent = displayText || '(response kosong)';

  } catch (err) {
    setStatusPill('gagal', 'status-4xx');
    statusMeta.textContent = '';
    responseBodyEl.textContent = 'Request gagal: ' + err.message +
      '\n\nKemungkinan penyebab: CORS, URL salah, server tidak bisa diakses, atau koneksi terputus.';
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Kirim';
  }
}

sendBtn.addEventListener('click', sendRequest);
urlEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendRequest();
});

function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID');
}
tickClock();
setInterval(tickClock, 1000);
</script>

</body>
</html>
